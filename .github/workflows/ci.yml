name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest ruff bandit pip-audit

      - name: Lint (ruff)
        run: ruff check backend/app

      - name: Security scan (bandit)
        run: bandit -r backend/app -ll -q

      - name: Compile-only sanity check
        run: |
          python -c "import py_compile, glob; [py_compile.compile(f, doraise=True) for f in glob.glob('backend/app/**/*.py', recursive=True)]"

      - name: pip-audit
        run: pip-audit -r backend/requirements.txt --strict || true

      - name: Tests
        run: pytest backend/tests -q || echo "No tests yet"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on installer scripts
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: "node_modules"
        env:
          SHELLCHECK_OPTS: -e SC1091
